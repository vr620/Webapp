<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Divya ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
max-width:420px;
}

h1{
color:#ff4b7d;
font-size:28px;
}

p{
font-size:18px;
color:#444;
}

#cat{
font-size:70px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

button{
padding:14px 26px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4b4b;
color:white;
position:absolute;
}

.heart{
position:absolute;
font-size:25px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-900px);opacity:0}
}

</style>

</head>

<body>

<div class="container">

<div id="cat">🥺🐱</div>

<h1 id="question">Divya ❤️</h1>

<p>
You know I love you so much.  
Even when we have our tiny cute fights,  
you are still my favorite person in the world.  

I don't like when we stay upset with each other 🥺
</p>

<h1 id="ask">Will you forgive me?</h1>

<button id="yes">Of course ❤️</button>
<button id="no">No</button>

</div>

<script>

let yes=document.getElementById("yes");
let no=document.getElementById("no");
let ask=document.getElementById("ask");

let size=1;

let messages=[
"Please forgive me 🥺",
"I promise I'll stop annoying you 😅",
"You know I love you ❤️",
"Don't stay mad at me 😭",
"Okay okay you win 😂"
];

let index=0;

function moveButton(){

let x=Math.random()*window.innerWidth*0.7;
let y=Math.random()*window.innerHeight*0.7;

no.style.left=x+"px";
no.style.top=y+"px";

size+=0.25;
yes.style.transform="scale("+size+")";

if(index < messages.length){
ask.innerText=messages[index];
index++;
}

}

no.addEventListener("mouseover",moveButton);
no.addEventListener("click",moveButton);

yes.addEventListener("click",()=>{

document.body.innerHTML=`

<div style="text-align:center">

<div style="font-size:80px">😺</div>

<h1 style="color:#ff4b7d;font-size:50px">
Yayyy ❤️
</h1>

<h2>Thank you Divya 🥺</h2>

<p style="font-size:24px">
See… happy cat now 😺  
I promise I'll try to annoy you less… maybe 😅  
But I will always love you the most ❤️
</p>

</div>

`;

hearts();

});

function hearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},200);

}

</script>

</body>

</html>
