<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Divya ❤️</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
text-align:center;
}

.container{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

h1{
color:#ff4b7d;
font-size:30px;
}

.cat{
font-size:60px;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

button{
padding:14px 28px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
margin:10px;
transition:0.3s;
}

#yes{
background:#4CAF50;
color:white;
}

#no{
background:#ff4b4b;
color:white;
position:absolute;
}

.heart{
position:absolute;
font-size:25px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-900px);opacity:0}
}

</style>

</head>

<body>

<div class="container">

<div class="cat">🥺</div>

<h1 id="question">Divya, I'm really sorry... will you forgive me? ❤️</h1>

<button id="yes">I forgive you ❤️</button>
<button id="no">No</button>

</div>

<script>

let yes=document.getElementById("yes");
let no=document.getElementById("no");
let question=document.getElementById("question");

let size=1;

let messages=[
"Divya please forgive me 🥺",
"I really didn't mean to hurt you ❤️",
"I promise I'll do better 💔",
"Please don't stay mad 😭",
"One last chance? 🥺"
];

let index=0;

function moveButton(){

let x=Math.random()*window.innerWidth*0.7;
let y=Math.random()*window.innerHeight*0.7;

no.style.left=x+"px";
no.style.top=y+"px";

size+=0.25;
yes.style.transform="scale("+size+")";

if(index < messages.length){
question.innerText=messages[index];
index++;
}

}

no.addEventListener("mouseover",moveButton);
no.addEventListener("click",moveButton);

yes.addEventListener("click",()=>{

document.body.innerHTML=`

<h1 style="font-size:60px;color:#ff4b7d">
Thank you Divya ❤️
</h1>

<h2>You just made me the happiest person 🥺</h2>

<p style="font-size:24px">
I promise I'll be better.  
Thank you for forgiving me ❤️
</p>

`;

hearts();

});

function hearts(){

setInterval(()=>{

let heart=document.createElement("div");

heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*window.innerWidth+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),5000);

},200);

}

</script>

</body>

</html>
